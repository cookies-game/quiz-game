<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== ライトモード（デフォルト） ===== */
        body {
            background: white;
        }

        body .level {
            color: white;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: flex;
        }

        .start-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 30px;
            padding: 13px 40px;
            background: white;
            border: 2px solid black;
            border-radius: 30px;
            box-shadow: 5px 5px 15px black;
            cursor: pointer;
            transition: 0.3s;
        }

        .start-btn:hover {
            box-shadow: none;
            transform: translate(-50%, -50%) translateY(-3px);
        }

        .setting-btn {
            font-size: 32px;
            background: none;
            border: none;
            position: static;
            margin-right: auto;
            transform: scale(1);
            cursor: pointer;
            transition: 0.3s;
            text-shadow: 2px 2px 6px rgb(45, 45, 45);
        }

        .setting-btn:hover {
            transform: scale(1.3);
            text-shadow: 3px 3px 8px rgb(80, 80, 80);
        }

        .setting-btn:active {
            transform: scale(1);
            text-shadow: 2px 2px 6px rgb(45, 45, 45);
        }

        .version {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 17px;
        }

        #setting-screen {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9998;
        }

        #setting-screen.active {
            display: flex;
        }

        .setting-box {
            width: 500px;
            height: 550px;
            background: white;
            border: 2px solid black;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
            box-shadow: 5px 5px 15px rgb(45, 45, 45);
            z-index: 9999;
            position: relative;
        }

        .setting-title {
            position: absolute;
            top: 7%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 30px;
        }

        .setting-description {
            position: absolute;
            top: 12%;
        }

        .name-input {
            width: 365px;
            padding: 7px;
            position: absolute;
            top: 20%;
            background: white;
            border: 1px solid black;
            border-radius: 15px;
            font-size: 17px;
        }

        .save-btn {
            width: 80px;
            padding: 7px;
            position: absolute;
            top: 20%;
            right: 4%;
            background: white;
            border: 1px solid black;
            border-radius: 15px;
            font-size: 14px;
            cursor: pointer;
            transform: scale(1);
            transition: 0.3s;
        }

        .save-btn:hover {
            transform: scale(1.2);
        }

        .save-btn:active {
            transform: scale(1);
        }

        .theme-description {
            position: absolute;
            top: 30%;
        }

        .theme-select-btn {
            position: absolute;
            top: 38%;
            width: 365px;
            padding: 10px;
            border: 1px solid black;
            border-radius: 17px;
            font-size: 15px;
        }

        .save-btn2 {
            position: absolute;
            top: 38%;
            right: 2%;
            width: 95px;
            padding: 9px;
            background: white;
            border: 1px solid black;
            border-radius: 15px;
            font-size: 14px;
            cursor: pointer;
            transform: scale(1);
            transition: 0.3s;
        }

        .save-btn2:hover {
            transform: scale(1.1);
        }

        .save-btn2:active {
            transform: scale(1);
        }

        .home-btn3 {
            width: 430px;
            padding: 7px;
            position: fixed;
            bottom: 10%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            background: white;
            border: 1px solid black;
            border-radius: 15px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .home-btn3:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }

        .home-btn3:active {
            transform: translate(-50%, -50%) scale(1);
        }

        #subj-select-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .subj-box {
            transition: 0.3s;
            border: 2px solid black;
            border-radius: 20px;
            padding: 40px 100px;
            background: white;
            box-shadow: 5px 5px 15px black;

            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .description {
            font-size: 20px;
        }

        .subjList {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .subj {
            font-size: 18px;
            padding: 12px 35px;
            background: white;
            border: 1px solid black;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            transform: scale(1);
        }

        .subj:hover {
            transform: scale(1.1);
            box-shadow: 0 0 10px rgb(45, 45, 45)
        }

        .subj:active {
            transform: scale(1);
            box-shadow: none;
        }

        .home-btn {
            font-size: 18px;
            padding: 10px 15px;
            width: 160px;
            background: white;
            border: 1px solid black;
            border-radius: 10px;
            transform: scale(1);
            transition: 0.3s;
            cursor: pointer;
        }

        .home-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 10px rgb(45, 45, 45);
        }

        .home-btn:active {
            transform: scale(1);
            box-shadow: none;
        }

        #quiz-screen {
            width: 100%;
            min-height: 100vh;

            flex-direction: column;
            align-items: center;
            justify-content: center;

            gap: 25px;

            padding: 30px;
        }

        .message {
            font-size: 35px;
            font-weight: bold;
            height: 40px;
        }

        .message.correct {
            color: rgb(80, 80, 255);
            text-shadow: 0 0 4px rgb(80, 80, 255);
        }

        .message.wrong {
            color: rgb(255, 60, 60);
            text-shadow: 0 0 4px rgb(255, 60, 60);
        }

        .score,
        .timer {
            font-size: 24px;

            background: white;

            padding: 12px 25px;

            border-radius: 15px;

            border: 2px solid black;

            box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.2);
        }

        .question-text {
            width: 80%;
            max-width: 900px;

            background: white;

            border: 3px solid black;
            border-radius: 25px;

            padding: 35px;

            text-align: center;

            font-size: 35px;

            box-shadow: 6px 6px 18px rgba(0, 0, 0, 0.25);
        }

        .choices {
            width: 80%;
            max-width: 900px;

            display: grid;

            grid-template-columns: repeat(2, 1fr);

            gap: 20px;
        }

        .choice-btn {
            font-size: 24px;

            padding: 20px;

            background: white;

            border: 2px solid black;
            border-radius: 20px;

            cursor: pointer;

            transition: 0.3s;

            box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.2);

            transform: scale(1);
        }

        .choice-btn:hover {
            transform: scale(1.05);

            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.3);
        }

        .choice-btn:active {
            transform: scale(1);

            box-shadow: none;
        }

        #result-screen {
            width: 100%;
            min-height: 100vh;

            align-items: center;
            justify-content: center;
        }

        .result-box {
            background: white;

            border: 3px solid black;
            border-radius: 30px;

            padding: 50px;

            display: flex;
            flex-direction: column;
            align-items: center;

            gap: 30px;

            box-shadow: 6px 6px 18px rgba(0, 0, 0, 0.3);
        }

        .result {
            font-size: 42px;
        }

        .result-text {
            font-size: 32px;
            font-weight: bold;
        }

        .button {
            display: flex;
            gap: 15px;

            flex-wrap: wrap;

            justify-content: center;
        }

        .restart-btn,
        .restart-btn2,
        .home-btn2 {
            font-size: 20px;

            padding: 15px 25px;

            background: white;

            border: 2px solid black;
            border-radius: 15px;

            cursor: pointer;

            transition: 0.3s;

            box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.2);

            transform: scale(1);
        }

        .restart-btn:hover,
        .restart-btn2:hover,
        .home-btn2:hover {
            transform: scale(1.05);

            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.25);
        }

        .restart-btn:active,
        .restart-btn2:active,
        .home-btn2:active {
            transform: scale(1);

            box-shadow: none;
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: 0.5s;
        }

        .loading-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .spinner {
            width: 70px;
            height: 70px;
            border: 7px solid rgb(220, 220, 220);
            border-top: 7px solid rgb(0, 170, 255);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            font-size: 40px;
            font-weight: bold;
            color: white;
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid cyan;
            width: 0ch;
            text-shadow: 0 0 10px cyan;
            animation:
                typing 2s steps(10) infinite,
                blink 0.5s step-end infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes typing {

            0% {
                width: 0ch;
                opacity: 1;
            }

            40% {
                width: 9ch;
                opacity: 1;
            }

            70% {
                width: 9ch;
                opacity: 1;
            }

            100% {
                width: 0ch;
                opacity: 0;
            }
        }

        @keyframes blink {

            50% {
                border-color: transparent;
            }
        }

        .level-exp-bar {
            position: static;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 200px;
            margin-left: auto;
        }

        .level {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .exp-bar {
            position: relative;
            width: 100%;
            height: 20px;
            background: rgb(45, 45, 45);
            border-radius: 10px;
            overflow: hidden;
        }

        .exp-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
        }

        .exp-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
            color: white;
            font-weight: bold;
            pointer-events: none;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            background: black;
            box-shadow: 3px 0 15px rgba(0, 0, 0, 0.3);
        }

        #fullscreen-screen {
            position: fixed;
            inset: 0;
            background: white;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        #fullscreen-screen.active {
            display: flex;
        }

        .fullscreen-box {
            background: white;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
        }

        .fullscreen-text {
            font-size: 28px;
            margin-bottom: 20px;
        }

        .fullscreen-btn {
            font-size: 22px;
            padding: 12px 25px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
        }

        .cancel-btn {
            font-size: 22px;
            padding: 12px 25px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
        }

        /* ===== ダークモード ===== */
        :root {
            --hover-color: rgb(115, 215, 255);
        }

        body.dark .setting-box,
        body.dark .subj-box,
        body.dark .result-box,
        body.dark {
            background: rgb(30, 30, 30);
            color: white;
        }

        body.dark .question-text,
        body.dark .score,
        body.dark .timer,
        body.dark .choice-btn,
        body.dark .start-btn,
        body.dark .home-btn,
        body.dark .restart-btn,
        body.dark .restart-btn2,
        body.dark .home-btn2,
        body.dark .save-btn,
        body.dark .home-btn3,
        body.dark .subj,
        body.dark .name-input,
        body.dark .theme-select-btn,
        body.dark .save-btn2 {
            background: rgb(45, 45, 45);
            color: white;
            border: 2px solid rgb(45, 45, 45);
        }

        body.dark .choice-btn,
        body.dark .subj-box,
        body.dark .result-box,
        body.dark .question-text,
        body.dark .name-input,
        body.dark .save-btn,
        body.dark .theme-select-btn,
        body.dark .save-btn2,
        body.dark .start-btn,
        body.dark .home-btn,
        body.dark .home-btn2,
        body.dark .home-btn3,
        body.dark .subj {
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.3);
        }

        body.dark .start-btn:hover,
        body.dark .subj:hover,
        body.dark .home-btn:hover,
        body.dark .restart-btn:hover,
        body.dark .restart-btn2:hover,
        body.dark .home-btn2:hover,
        body.dark .save-btn:hover,
        body.dark .home-btn3:hover,
        body.dark .choice-btn:hover,
        body.dark .save-btn2:hover {
            border-color: var(--hover-color);
            box-shadow: 0 0 12px var(--hover-color);
        }

        body.dark .fullscreen-text {
            color: black;
        }

    </style>
</head>

<body>

    <header class="header">

        <button class="setting-btn" onclick="openSetting()">
            🛠️
        </button>

        <div class="level-exp-bar">

            <p class="level"></p>

            <div class="exp-bar">

                <div class="exp-fill"></div>

                <span class="exp-text"></span>

            </div>

        </div>
        
    </header>



    <p class="version">
        ver.1.2.0
    </p>

    <div id="home-screen" class="screen active">


        <button class="start-btn" onclick="app.showScreen('subj-select-screen')">
            ゲームプレイ
        </button>

    </div>

    <div id="subj-select-screen" class="screen">

        <div class="subj-box">

            <p class="description">
                教科を選択してください
            </p>

            <div class="subjList">

                <button class="subj" data-subj="japanese">
                    国語
                </button>

                <button class="subj" data-subj="math">
                    算数
                </button>

                <button class="subj" data-subj="science">
                    理科
                </button>

                <button class="subj" data-subj="social">
                    社会
                </button>

                <button class="subj" data-subj="english">
                    英語
                </button>

            </div>

            <button class="home-btn" onclick="app.showScreen('home-screen')">
                戻る
            </button>

        </div>

    </div>

    <div id="quiz-screen" class="screen">
        <p class="message"></p>
        <p class="score">正解数：0問</p>
        <p class="timer">30秒</p>
        <h2 class="question-text"></h2>
        <div class="choices"></div>
    </div>

    <div id="result-screen" class="screen">

        <div class="result-box">

            <h2 class="result">
                最終結果
            </h2>

            <p class="result-text"></p>

            <div class="button">

                <button class="restart-btn2">
                    教科を選びなおす
                </button>

                <button class="restart-btn">
                    もう一度プレイ
                </button>

                <button class="home-btn2" onclick="app.showScreen('home-screen')">
                    戻る
                </button>

            </div>

        </div>

    </div>

    <div id="setting-screen" class="screen">
        <div class="setting-box">
            <h2 class="setting-title">
                設定🛠️
            </h2>

            <p class="setting-description">
                名前変更（15文字以内）
            </p>

            <input class="name-input" type="text" maxlength="15" placeholder="例：「田中太郎」">

            <button class="save-btn">
                保存する
            </button>

            <div class="theme-select">
                <p class="theme-description">
                    テーマを変更
                </p>
                <select class="theme-select-btn">
                    <option value="light">ライトモードにする（デフォルト）</option>
                    <option value="dark">ダークモードにする</option>
                </select>
                <button class="save-btn2">
                    適応させる
                </button>
            </div>

            <button class="home-btn3" onclick="closeSetting()">
                戻る
            </button>
        </div>
    </div>

    <div id="loading-screen">

        <div class="loading-box">

            <div class="spinner"></div>

            <p class="loading-text">
                Loading...
            </p>

        </div>

    </div>

    <div id="fullscreen-screen">

        <div class="fullscreen-box">

            <p class="fullscreen-text">
                このゲームは<br>
                全画面でプレイすることを<br>
                推奨します。
            </p>

            <button class="fullscreen-btn" onclick="enterFullScreen()">
                全画面にする
            </button>

            <button class="cancel-btn">
                キャンセル
            </button>

        </div>

    </div>

    <script type="module">

        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";
        import {
            getFirestore,
            doc,
            setDoc,
            getDoc
        } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
        // TODO: Add SDKs for Firebase products that you want to use
        // https://firebase.google.com/docs/web/setup#available-libraries

        // Your web app's Firebase configuration
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "AIzaSyDl1KeQmi-3ipoOw3GIaM1iq27WWgRTw5g",
            authDomain: "quiz-game-14052.firebaseapp.com",
            projectId: "quiz-game-14052",
            storageBucket: "quiz-game-14052.firebasestorage.app",
            messagingSenderId: "685737591431",
            appId: "1:685737591431:web:16ec4fd2781948337b6e22",
            measurementId: "G-3HDMSE6ZYK"
        };

        function createuserID() {
            return "user_" + Math.random().toString(36).substring(2, 10);
        }
        let userID = localStorage.getItem("userID");
        if (!userID) {
            userID = createuserID();
            localStorage.setItem("userID", userID);
        }

        let userName = localStorage.getItem("userName");
        if (!userName) {
            userName = "Guest666";
        }

        async function createUserDataIfFirstTime() {

            const docRef = doc(db, "users", userID);
            const docSnap = await getDoc(docRef);

            if (!docSnap.exists()) {

                await setDoc(docRef, {
                    name: userName,
                    createdAt: Date.now()
                });

                console.log("初回ユーザーデータ作成");
            }
        }

        // Initialize Firebase
        const firebaseApp = initializeApp(firebaseConfig);
        const analytics = getAnalytics(firebaseApp);
        const db = getFirestore(firebaseApp);

        const homescreen = document.getElementById("home-screen");
        const subjscreen = document.getElementById("subj-select-screen");
        const quizscreen = document.getElementById("quiz-screen");
        const resultscreen = document.getElementById("result-screen");
        const settingscreen = document.getElementById("setting-screen");
        const loadingscreen = document.getElementById("loading-screen");

        const startbtn = document.querySelector(".start-btn");
        const homebtn = document.querySelector(".home-btn");
        const restartbtn = document.querySelector(".restart-btn");
        const restartbtn2 = document.querySelector(".restart-btn2");
        const subjbuttons = document.querySelectorAll(".subj");
        const message = document.querySelector(".message");
        const scoreText = document.querySelector(".score");
        const timerText = document.querySelector(".timer");
        const questiontext = document.querySelector(".question-text");
        const choices = document.querySelector(".choices");
        const result = document.querySelector(".result");
        const resultText = document.querySelector(".result-text");
        const nameInput = document.querySelector(".name-input");
        const savebtn = document.querySelector(".save-btn");
        const themeSelect = document.querySelector(".theme-select-btn");
        const savebtn2 = document.querySelector(".save-btn2");

        window.onload = async () => {

            nameInput.value = userName;

            await createUserDataIfFirstTime();

            await loadName();

            updateLevelUI();

            const savedTheme = localStorage.getItem("theme");

            if (savedTheme === "dark") {

                document.body.classList.add("dark");
                themeSelect.value = "dark";

            }

            loadingscreen.style.opacity = "0";

            setTimeout(() => {

                loadingscreen.style.display = "none";

            }, 500);
        };

        function isChromebook() {

            const ua = navigator.userAgent.toLowerCase();

            return ua.includes("cros");
        }

        function checkFullscreenOverlay() {

            // Chromebook以外は出さない
            if (!isChromebook()) return;

            // すでに全画面なら出さない
            if (document.fullscreenElement) return;

            document
                .getElementById("fullscreen-screen")
                .classList.add("active");
        }

        setTimeout(() => {

            checkFullscreenOverlay();

        }, 500);

        const quizData = {
            japanese: [
                {
                    question: "「石の上にも三年」の意味は？",
                    choices: [
                        "すぐにあきらめる",
                        "我慢して続けるといいことがある",
                        "石を三年間積み上げる",
                        "早く行動する"
                    ],
                    answer: "我慢して続けるといいことがある"
                },
                {
                    question: "「二兎を追う者は一兎をも得ず」の意味は？",
                    choices: [
                        "二つのことを同時に頑張る",
                        "欲張るとどちらもうまくいかない",
                        "ウサギを二匹捕まえる",
                        "1つはあきらめないといけない"
                    ],
                    answer: "欲張るとどちらもうまくいかない"
                },
                {
                    question: "「急がば回れ」の意味は？",

        function shuffleArray(array) {

            const newArray = [...array];

            for (let i = newArray.length - 1; i > 0; i--) {

                const j = Math.floor(Math.random() * (i + 1));

                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }

            return newArray;
        }

        let currentSubject = "";
        let currentQuestions = [];
        let currentQuestionIndex = 0;

        let score = 0;
        let time = 30;
        let timer;

        let level = 1;
        let exp = 0;
        let maxexp = 100;
        let getexp = 0;

        function showScreen(screenId) {
            document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
            document.getElementById(screenId).classList.add("active");
        }

        subjbuttons.forEach(button => {
            button.onclick = () => {

                currentSubject = button.dataset.subj;

                currentQuestions = shuffleArray(quizData[currentSubject]);

                currentQuestionIndex = 0;

                score = 0;
                time = 30;
                getexp = 0;

                scoreText.textContent = "正解数：" + score + "問";
                timerText.textContent = time + "秒";

                clearInterval(timer);

                startTimer();

                showScreen("quiz-screen");

                showQuestion();

            };
        });

        window.app = { showScreen };

        function showQuestion() {

            const questionData = currentQuestions[currentQuestionIndex];

            questiontext.textContent = questionData.question;

            choices.innerHTML = "";

            const shuffledChoices = shuffleArray(questionData.choices);

            shuffledChoices.forEach(choice => {

                choices.innerHTML += `
                    <button class="choice-btn">
                        ${choice}
                    </button>
                `;
            });

            const choiceButtons = document.querySelectorAll(".choice-btn");

            choiceButtons.forEach(button => {
                button.onclick = () => {
                    choiceButtons.forEach(btn => {
                        btn.disabled = true;
                    });
                    if (button.textContent.trim() === questionData.answer) {

                        message.textContent = "正解！！"

                        message.classList.remove("wrong");
                        message.classList.add("correct");

                        score++;

                        getexp += 10;

                        scoreText.textContent = "正解数：" + score + "問";

                    } else {

                        message.textContent = "不正解……"

                        message.classList.remove("correct");
                        message.classList.add("wrong");

                    }

                    currentQuestionIndex++;

                    setTimeout(() => {

                        message.textContent = "";

                        if (currentQuestionIndex < quizData[currentSubject].length) {

                            showQuestion();

                        } else {

                            clearInterval(timer);

                            addExp(getexp);

                            updateLevelUI();

                            saveProgress();

                            resultText.textContent = "正解数：" + score + "問！！"

                            showScreen("result-screen");

                        }
                    }, 1500);
                };
            });
        }

        function startTimer() {

            clearInterval(timer);

            timer = setInterval(() => {

                time--;

                timerText.textContent = time + "秒";

                if (time <= 0) {

                    clearInterval(timer);

                    addExp(getexp);

                    updateLevelUI();

                    saveProgress();

                    resultText.textContent = "正解数：" + score + "問！！"

                    showScreen("result-screen");

                }
            }, 1000);
        }

            currentQuestions = shuffleArray(quizData[currentSubject]);

        // ユーザー名保存処理
        savebtn.onclick = async function () {

            const playerName = nameInput.value.trim();

            if (playerName === "") {
                alert("名前を入力してください");
                return;
            }

            try {
                await setDoc(doc(db, "users", userID), {
                    name: playerName,
                    level: level,
                    exp: exp,
                    maxexp: maxexp
                }, { merge: true });

                localStorage.setItem("userName", playerName);
                userName = playerName;
                alert("名前を保存しました")
                settingscreen.classList.remove("active");
            } catch (error) {
                console.error(error);
                alert("保存に失敗しました");
            }
        }

        // ユーザー名・データ読み込み処理
        async function loadName() {
            try {
                const docRef = doc(db, "users", userID);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.name) {
                        nameInput.value = data.name;
                        userName = data.name;
                        localStorage.setItem("userName", data.name);
                    }

                    if (data.level !== undefined) level = data.level;
                    if (data.exp !== undefined) exp = data.exp;
                    if (data.maxexp !== undefined) maxexp = data.maxexp;

                    updateLevelUI();
                } else {
                    nameInput.value = userName;
                }
            } catch (error) {
                console.error(error);
            }
        }

        savebtn2.onclick = function () {

            const selectedTheme = themeSelect.value;

            if (selectedTheme === "dark") {

                document.body.classList.add("dark");

                localStorage.setItem("theme", "dark");

                alert("適応しました！")

                settingscreen.classList.remove("active");

            } else {

                document.body.classList.remove("dark");

                localStorage.setItem("theme", "light");

                alert("適応しました！")

                settingscreen.classList.remove("active");

            }
        }

        async function saveProgress() {
            await setDoc(doc(db, "users", userID), {
                level,
                exp,
                maxexp
            }, { merge: true });
        }

        function addExp(amount) {
            exp += amount;

            while (exp >= maxexp) {
                exp -= maxexp;
                level++;
                maxexp += 100;
            }

            updateLevelUI();
        }

        function updateLevelUI() {
            document.querySelector(".level").textContent = "Lv." + level;

            const percent = (exp / maxexp) * 100;
            document.querySelector(".exp-fill").style.width = percent + "%";

            document.querySelector(".exp-text").textContent = `
                ${exp} / ${maxexp}`;
        }

        function isFullScreen() {
            return document.fullscreenElement || document.webkitFullscreenElement;
        }

        window.enterFullScreen = function() {

            const elem = document.documentElement;

            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            }

            document
                .getElementById("fullscreen-screen")
                .classList.remove("active");
        }

        document.querySelector(".cancel-btn").onclick = function() {
            document
                .getElementById("fullscreen-screen")
                .classList.remove("active");
        }

        document.addEventListener("fullscreenchange", () => {

            const overlay = document.getElementById("fullscreen-screen");

            if (!document.fullscreenElement) {

                checkFullscreenOverlay();

            } else {

                overlay.classList.remove("active");
            }
        });
