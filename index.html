            display: flex;
        }

            font-size: 70px;

            text-shadow: 3px 3px 10px rgb(30, 30, 30);

        .buttons {
            position: absolute;

            transform: translateY(-3px);

            display: flex;

            justify-content: center;
            z-index: 9999;
            transition: 0.5s;
        }

        .loading-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .spinner {
            width: 70px;
            height: 70px;
            border: 7px solid rgb(220, 220, 220);
            border-top: 7px solid rgb(0, 170, 255);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            font-size: 40px;
            font-weight: bold;
            color: white;
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid cyan;
            width: 0ch;
            text-shadow: 0 0 10px cyan;
            animation:
                typing 2s steps(10) infinite,
                blink 0.5s step-end infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes typing {

            0% {
                width: 0ch;
                opacity: 1;
            }

            40% {
                width: 9ch;
                opacity: 1;
            }

            70% {
                width: 9ch;
                opacity: 1;
            }

            100% {
                width: 0ch;
                opacity: 0;
            }
        }

        @keyframes blink {

            50% {
                border-color: transparent;
            }
        }

        function shuffleArray(array) {

            const newArray = [...array];

            for (let i = newArray.length - 1; i > 0; i--) {

                const j = Math.floor(Math.random() * (i + 1));

                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }

            return newArray;
        }

                return;
            }

            try {
                await setDoc(doc(db, "users", userID), {
                    name: playerName,
                    level: level,
                    exp: exp,
                    maxexp: maxexp,
                    coin,
                    gem,
                    point,
                    ticket
                }, { merge: true });

                localStorage.setItem("userName", playerName);
                userName = playerName;
                alert("名前を保存しました")
                settingscreen.classList.remove("active");
            } catch (error) {
                console.error(error);
                alert("保存に失敗しました");
            }
        }

        // ユーザー名・データ読み込み処理
        async function loadName() {
            try {
                const docRef = doc(db, "users", userID);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.name) {
                        nameInput.value = data.name;
                        userName = data.name;
                        localStorage.setItem("userName", data.name);
                    }

                    if (data.level !== undefined) level = data.level;
                    if (data.exp !== undefined) exp = data.exp;
                    if (data.maxexp !== undefined) maxexp = data.maxexp;
                    if (data.coin !== undefined) coin = data.coin;
                    if (data.gem !== undefined) gem = data.gem;
                    if (data.point !== undefined) point = data.point;
                    if (data.ticket !== undefined) ticket = data.ticket;
                    if (data.ownedSkills !== undefined) ownedSkills = data.ownedSkills;
                    if (data.equippedSkill !== undefined) equippedSkill = data.equippedSkill;
                    if (data.adminTime !== undefined) {
                        adminTime = data.adminTime;
                        document.querySelector(".admin-time").value = adminTime;
                    }
                    if (data.adminChoiceCount !== undefined) {
                        adminChoiceCount = data.adminChoiceCount;
                        document.querySelector(".admin-choice-count").value = adminChoiceCount;
                    }

                    updateLevelUI();

                    updatecurrencyUI();
                } else {
                    nameInput.value = userName;
                }
            } catch (error) {
                console.error(error);
            }
        }

        savebtn2.onclick = function () {

            const selectedTheme = themeSelect.value;

            if (selectedTheme === "dark") {

                document.body.classList.add("dark");

                localStorage.setItem("theme", "dark");

                alert("適応しました！")

                settingscreen.classList.remove("active");

            } else {

                document.body.classList.remove("dark");

                localStorage.setItem("theme", "light");

                alert("適応しました！")

                settingscreen.classList.remove("active");

            }
        }

        async function saveProgress() {
            try {
                await setDoc(doc(db, "users", userID), {
                    level,
                    exp,
                    maxexp,
                    coin,
                    gem,
                    point,
                    ticket,
                    ownedSkills,
                    equippedSkill,
                    adminTime,
                    adminChoiceCount
                }, { merge: true });
            } catch (error) {
                console.error("保存失敗", error);
            }
        }

        function addExp(amount) {
            exp += amount;

            while (exp >= maxexp) {
                exp -= maxexp;
                level++;
                maxexp += 100;
            }

            updateLevelUI();
        }

        function updateLevelUI() {
            document.querySelector(".level").textContent = "Lv." + level;

            const percent = (exp / maxexp) * 100;
            document.querySelector(".exp-fill").style.width = percent + "%";

            document.querySelector(".exp-text").textContent = `${exp} / ${maxexp}`;
        }

        function updatecurrencyUI() {

            // ヘッダー側
            document.querySelector(".coin-text").textContent = coin;

            document.querySelector(".gem-text").textContent = gem;

            document.querySelector(".point-text").textContent = point;

            document.querySelector(".ticket-text").textContent = ticket;

            // ショップ側
            document.querySelector(".shop-coin-text").textContent = coin;

            document.querySelector(".shop-gem-text").textContent = gem;
        }

        function isFullScreen() {
            return document.fullscreenElement || document.webkitFullscreenElement;
        }

        window.enterFullScreen = function () {

            const elem = document.documentElement;

            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            }

            document
                .getElementById("fullscreen-screen")
                .classList.remove("active");
        }

        document.querySelector(".cancel-btn").onclick = function () {
            document
                .getElementById("fullscreen-screen")
                .classList.remove("active");
        }

        function loadInventory() {

            const container = document.querySelector(".skills-container");

            container.innerHTML = "";

            if (ownedSkills.length === 0) {

                container.innerHTML = `
                    <p class="inventory-empty">
                        スキルを所持していません
                    </p>
                `;

                return;
            }

            ownedSkills.forEach(skillId => {

                const allSkills = [...skills, ...skillGachaItems];

                const skill = allSkills.find(s => s.id === skillId);

                if (!skill) return;

                container.innerHTML += `
                    <div class="inventory-skill">

                        <h3 class="inventory-skill-name">
                            ${skill.name}
                        </h3>
                        
                        <p class="inventory-skill-description">
                            ${skill.description}
                        </p>

                        ${equippedSkill === skill.id
                        ? `
                                <button class="equipped-btn" disabled>
                                    装備中
                                </button>
                            `
                        : `
                                <button class="equipped-btn" onclick="equippedSkills('${skill.id}')">
                                    装備
                                </button>
                            `
                    }
                        
                    </div>
                `;
            });
        }

        window.equippedSkills = async function (skillId) {

            equippedSkill = skillId;

            await saveProgress();

            loadInventory();

            const allSkills = [...skills, ...skillGachaItems];

            const skill = allSkills.find(s => s.id === skillId);

            alert(skill.name + "を装備しました！");
        }

        window.currencyGacha = async function () {

            const btn = document.querySelector("#currency-gacha-screen .draw-btn");
            btn.disabled = true;

            try {

                if (point < currencyGachaCost) {
                    alert("pointが足りません");
                    return;
                }

                point -= currencyGachaCost;

                const rand = Math.random() * 100;

                let total = 0;
                let reward = null;

                for (const currency of currencyGachaItems) {

                    total += currency.chance;

                    if (rand <= total) {
                        reward = currency;
                        break;
                    }
                }

                if (!reward) return;

                addCurrency(reward.type, reward.amount);

                await saveProgress();

                alert(`${reward.name} を獲得！`);
            } finally {
                btn.disabled = false;
            }
        }

        window.skillGacha = async function () {

            const btn = document.querySelector("#skill-gacha-screen .draw-btn");
            btn.disabled = true;

            try {

                if (point < skillGachaCost) {
                    alert("pointが足りません");
                    return;
                }

                point -= skillGachaCost;
                updatecurrencyUI();

                let totalChance = 0;
                for (const skill of skillGachaItems) {
                    totalChance += rarityList[skill.rarity];
                }

                const rand = Math.random() * totalChance;
                let total = 0;
                let reward = null;

                for (const skill of skillGachaItems) {
                    total += rarityList[skill.rarity];
                    if (rand <= total) {
                        reward = skill;
                        break;
                    }
                }
                if (!reward) return;

                if (!ownedSkills.includes(reward.id)) {
                    ownedSkills.push(reward.id);
                }

                await saveProgress();

                alert(`${reward.name}\nレア度： ${reward.rarity}\n${reward.description}`);

            } finally {
                btn.disabled = false;
            }
        };

    </script>
</body>

</html>
