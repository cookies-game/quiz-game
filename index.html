        body {
            background: white;

            display: none;

            display: flex;
        }

        .message-list {
            font-size: 35px;

            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100000;
        }

        .message-list:empty {
            display: none;
        }

        .message-card {
            display: inline-block;
            min-width: 60px;
            max-width: 500px;
            color: black;
            background: white;
            border: 2px solid black;
            white-space: pre-wrap;
            text-align: center;
            opacity: 1;
            transition: opacity 1s ease;
        }

        .message-card.fade-out {
            opacity: 0;
        }

        .buttons {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            flex-direction: column;

            align-items: center;

            inset: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: 0.5s;
        }

            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

            width: 70px;
            height: 70px;

            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

            font-size: 40px;
            font-weight: bold;
            color: white;
            overflow: hidden;
            white-space: nowrap;

            width: 0ch;
            text-shadow: 0 0 10px cyan;
            animation:

                blink 0.5s step-end infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {

            }
        }

                opacity: 1;
            }

            40% {
                width: 9ch;
                opacity: 1;
            }

            70% {
                width: 9ch;
                opacity: 1;
            }

            100% {

            }

        function shuffleArray(array) {

            const newArray = [...array];

            for (let i = newArray.length - 1; i > 0; i--) {

                const j = Math.floor(Math.random() * (i + 1));

                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }

        window.deleteUserByID = async function () {

            const input = document.querySelector(".delete-user-id");

            const userID = input.value.trim();

            if (!userID) return;

            const userIDs = userID
                .split(/[,]/)
                .map(id => id.trim())
                .filter(Boolean);

            if (userIDs.length === 0) return;

            try {

                for (const id of userIDs) {

                    const docRef = doc(db, "users", id);
                    const docSnap = await getDoc(docRef);

                    if (!docSnap.exists()) {

                        message.textContent = `「${id}」は存在しません`;

                        setTimeout(() => {
                            message.textContent = "";
                        }, 1500);

                        return;
                    }
                }

                const ok = confirm(userIDs.join("、 ") + "を削除しますか？");

                if (!ok) return;

                await Promise.all(
                    userIDs.map(id =>
                        deleteDoc(doc(db, "users", id))
                    )
                );

                alert("削除しました");

                input.value = "";

            } catch (error) {

                console.error(error);

                alert("削除に失敗しました");
            }

                return;
            }

            ownedSkills
                .filter(skillId => skillId !== "c00lkidd")
                .forEach(skillId => {

                    const allSkills = [...skills, ...skillGachaItems];

                    const skill = allSkills.find(s => s.id === skillId);

                    if (!skill) return;

                    container.innerHTML += `
                    <div class="inventory-skill">

                        <h3 class="inventory-skill-name">
                            ${skill.name}
                        </h3>
                        
                        <p class="inventory-skill-description">
                            ${skill.description}
                        </p>

                        ${equippedSkill === skill.id
                            ? `
                                <button class="equipped-btn" disabled>
                                    装備中
                                </button>
                            `
                            : `
                                <button class="equipped-btn" onclick="equippedSkills('${skill.id}')">
                                    装備
                                </button>
                            `
                        }
                        
                    </div>
                `;
                });
        }

        window.equippedSkills = async function (skillId) {

            equippedSkill = skillId;

            await saveProgress();

            loadInventory();

            const allSkills = [...skills, ...skillGachaItems];

            const skill = allSkills.find(s => s.id === skillId);

            alert(skill.name + "を装備しました！");
        }

        window.currencyGacha = async function () {

            const btn = document.querySelector("#currency-gacha-screen .draw-btn");
            btn.disabled = true;

            try {

                if (point < currencyGachaCost) {
                    alert("pointが足りません");
                    return;
                }

                point -= currencyGachaCost;

                const rand = Math.random() * 100;

                let total = 0;
                let reward = null;

                for (const currency of currencyGachaItems) {

                    total += currency.chance;

                    if (rand <= total) {
                        reward = currency;
                        break;
                    }
                }

                if (!reward) return;

                addCurrency(reward.type, reward.amount);

                await saveProgress();

                alert(`${reward.name} を獲得！`);
            } finally {
                btn.disabled = false;
            }
        }

        window.skillGacha = async function () {

            const btn = document.querySelector("#skill-gacha-screen .draw-btn");
            btn.disabled = true;

            try {

                if (point < skillGachaCost) {
                    alert("pointが足りません");
                    return;
                }

                point -= skillGachaCost;
                updatecurrencyUI();

                let totalChance = 0;
                for (const skill of skillGachaItems) {
                    totalChance += rarityList[skill.rarity];
                }

                const rand = Math.random() * totalChance;
                let total = 0;
                let reward = null;

                for (const skill of skillGachaItems) {
                    total += rarityList[skill.rarity];
                    if (rand <= total) {
                        reward = skill;
                        break;
                    }
                }
                if (!reward) return;

                if (!ownedSkills.includes(reward.id)) {
                    ownedSkills.push(reward.id);
                }

                await saveProgress();

                alert(`${reward.name}\nレア度： ${reward.rarity}\n${reward.description}`);

            } finally {
                btn.disabled = false;
            }
        };

        document.addEventListener("keydown", async (e) => {

            adminCode += e.key.toLowerCase();

            if (adminCode.length > 5) {
                adminCode = adminCode.slice(-5);
            }

            if (adminCode === "admin") {

                adminCode = "";

                if (isAdmin) {

                    const result = confirm("管理者を削除しますか？");

                    if (result) {

                        isAdmin = false;

                        localStorage.removeItem("isAdmin");

                        location.reload();
                    }

                    return;
                }

                const password = prompt("Please enter administrator password");

                if (password === null) {
                    return;
                }

                const docRef = doc(db, "admin-pass", "password");
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const realPassword = docSnap.data().password;

                    if (password === null) {
                        return;
                    }

                    if (password === realPassword) {

                        location.reload();

                        isAdmin = true;

                        localStorage.setItem("isAdmin", "true");

                        document.querySelector(".admin-btn").style.display = "flex";

                        document.querySelector(".admin-confirmation").style.display = "flex";
                    } else {
                        alert("NO")
                    }
                }
            }
        });

    </script>
</body>

</html>
